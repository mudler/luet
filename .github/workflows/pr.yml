
on: pull_request
name: Build and Test
jobs:
  tests-integration-img:
    strategy:
      matrix:
        go-version: [1.25.x]
        platform: [ubuntu-latest]
    runs-on: ${{ matrix.platform }}
    steps:
    - name: Install Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Free Disk Space
      uses: jlumbroso/free-disk-space@v1.3.1
      with:
        tool-cache: false
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true
    - name: setup-docker
      uses: docker-practice/actions-setup-docker@0.0.1
    - name: Install deps
      run: |
            sudo apt-get update && sudo apt-get install -y upx && sudo -E env "PATH=$PATH" make deps
            sudo curl -fSL "https://github.com/genuinetools/img/releases/download/v0.5.11/img-linux-amd64" -o "/usr/bin/img"
            sudo chmod a+x "/usr/bin/img"
    - name: Tests with Img backend
      run: sudo -E env "PATH=$PATH" env "LUET_BACKEND=img" make test-integration

  tests-integration:
    strategy:
      fail-fast: false
      matrix:
        go-version: [1.25.x]
        platform: [ubuntu-latest]
        docker-version: ["26.1.4", "28.5.2", "29.1.2"]
        containerd-snapshotter: [true, false]
    runs-on: ${{ matrix.platform }}
    name: integration (docker ${{ matrix.docker-version }}, containerd-store ${{ matrix.containerd-snapshotter }})
    steps:
    - name: Install Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Free Disk Space
      uses: jlumbroso/free-disk-space@v1.3.1
      with:
        tool-cache: false
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true
    - name: setup-docker
      uses: docker/setup-docker-action@v5
      with:
        version: ${{ matrix.docker-version }}
        set-host: true
        daemon-config: |
          {
            "features": {
              "containerd-snapshotter": ${{ matrix.containerd-snapshotter }}
            }
          }
    - name: Verify the tests will talk to the pinned daemon
      run: |
        set -euo pipefail
        echo "DOCKER_HOST=${DOCKER_HOST:-<unset>}"
        got=$(sudo -E env "PATH=$PATH" docker version --format '{{.Server.Version}}')
        echo "server version under sudo: $got"
        if [ "$got" != "${{ matrix.docker-version }}" ]; then
          echo "::error::sudo docker resolved $got, expected ${{ matrix.docker-version }}"
          exit 1
        fi
        driver=$(sudo -E env "PATH=$PATH" docker info --format '{{.Driver}}')
        echo "storage driver under sudo: $driver (containerd-snapshotter=${{ matrix.containerd-snapshotter }})"
        if [ "${{ matrix.containerd-snapshotter }}" = "true" ] && [ "$driver" = "overlay2" ]; then
          echo "::warning::containerd snapshotter was requested but driver is overlay2 - verify this axis is taking effect"
        fi
    - name: Install deps
      run: |
            sudo apt-get update && sudo apt-get install -y upx && sudo -E env "PATH=$PATH" make deps
    - name: Tests
      run: sudo -E env "PATH=$PATH" make test-integration
  tests-unit:
    strategy:
      matrix:
        go-version: [1.25.x]
        platform: [ubuntu-latest]
    runs-on: ${{ matrix.platform }}
    steps:
    - name: Install Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Free Disk Space
      uses: jlumbroso/free-disk-space@v1.3.1
      with:
        tool-cache: false
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true
    - name: setup-docker
      uses: docker-practice/actions-setup-docker@0.0.1
    - name: Install deps
      run: |
            sudo apt-get update && sudo apt-get install -y upx && sudo -E env "PATH=$PATH" make deps
            sudo curl -fSL "https://github.com/genuinetools/img/releases/download/v0.5.11/img-linux-amd64" -o "/usr/bin/img"
            sudo chmod a+x "/usr/bin/img"
            sudo make build
            sudo cp -rf luet /usr/bin/luet
    - name: Install GoReleaser
      uses: goreleaser/goreleaser-action@v6
      with:
        install-only: true
    - name: Build
      run: sudo -E env "PATH=$PATH" make multiarch-build-small
    - name: Tests
      run: sudo -E env "PATH=$PATH" make coverage
    - name: Codecov
      uses: codecov/codecov-action@v5
      with:
        file: coverage.txt
